<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf2f8">
<title>Our Elements — When You Know, You Know</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --color-bg-start: #fdf2f8;
  --color-bg-end: #fce7f3;
  --color-bg-deep: #f9d4e8;
  --color-rose: #b76e79;
  --color-rose-light: #d4a0aa;
  --color-rose-dark: #8b4a55;
  --color-rose-gold: #c5937e;
  --color-rose-gold-light: #e8c4b0;
  --color-cream: #fefbf7;
  --color-cream-warm: #fdf5ed;
  --color-text: #5a2d3a;
  --color-text-light: #8b5e6b;
  --color-text-faint: #b8899a;
  --color-card-border: rgba(197, 147, 126, 0.35);
  --color-card-shadow: rgba(183, 110, 121, 0.12);
  --font-display: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --font-body: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-body);
  color: var(--color-text);
  background: linear-gradient(160deg, var(--color-bg-start) 0%, var(--color-bg-end) 50%, var(--color-bg-deep) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.page {
  max-width: 540px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
  padding-top: 1rem;
}

.back-link {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--color-text-faint);
  text-decoration: none;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  transition: color 0.2s;
}

.back-link:hover {
  color: var(--color-rose);
}

.header h1 {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 5.5vw, 2.4rem);
  font-weight: 300;
  font-style: italic;
  color: var(--color-rose);
  letter-spacing: 0.03em;
  line-height: 1.35;
  margin-bottom: 0.5rem;
}

.header-sub {
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 300;
  color: var(--color-text-faint);
  letter-spacing: 0.08em;
}

.header-line {
  display: block;
  width: 50px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-rose-gold-light), transparent);
  margin: 1rem auto 0;
}

/* Element entries */
.entry {
  margin-bottom: 2rem;
  opacity: 0;
  transform: translateY(15px);
  animation: entryIn 0.6s var(--transition-smooth) forwards;
}

@keyframes entryIn {
  to { opacity: 1; transform: translateY(0); }
}

.entry-card {
  background: linear-gradient(145deg, var(--color-cream), var(--color-cream-warm));
  border: 1px solid var(--color-card-border);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow:
    0 2px 8px var(--color-card-shadow),
    inset 0 1px 0 rgba(255, 255, 255, 0.7);
}

.entry-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1rem;
}

.entry-symbol {
  width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: linear-gradient(145deg, var(--color-bg-end), var(--color-bg-deep));
  border: 1px solid var(--color-card-border);
  flex-shrink: 0;
}

.entry-symbol span {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--color-rose-dark);
}

.entry-meta {
  flex: 1;
}

.entry-name {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 500;
  color: var(--color-rose-dark);
  line-height: 1.2;
}

.entry-subtitle {
  font-family: var(--font-body);
  font-size: 0.7rem;
  font-weight: 400;
  color: var(--color-text-faint);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 0.2rem;
}

.entry-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-card-border), transparent);
  margin-bottom: 1rem;
}

.entry-text {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--color-text);
  line-height: 1.8;
}

/* Footer */
.glossary-footer {
  text-align: center;
  margin-top: 1rem;
}

.glossary-footer-heart {
  display: inline-block;
  color: var(--color-rose-light);
  font-size: 0.9rem;
  animation: heartPulse 2.5s ease-in-out infinite;
}

@keyframes heartPulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.15); opacity: 1; }
}

/* Stagger entry animations */
.entry:nth-child(1) { animation-delay: 0.05s; }
.entry:nth-child(2) { animation-delay: 0.1s; }
.entry:nth-child(3) { animation-delay: 0.15s; }
.entry:nth-child(4) { animation-delay: 0.2s; }
.entry:nth-child(5) { animation-delay: 0.25s; }
.entry:nth-child(6) { animation-delay: 0.3s; }
.entry:nth-child(7) { animation-delay: 0.35s; }
.entry:nth-child(8) { animation-delay: 0.4s; }
.entry:nth-child(9) { animation-delay: 0.45s; }
.entry:nth-child(10) { animation-delay: 0.5s; }
.entry:nth-child(11) { animation-delay: 0.55s; }
.entry:nth-child(12) { animation-delay: 0.6s; }
.entry:nth-child(13) { animation-delay: 0.65s; }

@supports (padding: env(safe-area-inset-top)) {
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <a href="index.html" class="back-link">&larr; Back to the table</a>
    <h1>Our Elements</h1>
    <span class="header-sub">The periodic table of us</span>
    <span class="header-line"></span>
  </header>

  <div id="entries">
    <!-- Entries are rendered by JS from the config below -->
  </div>

  <div class="glossary-footer">
    <span class="glossary-footer-heart" aria-hidden="true">&#9825;</span>
  </div>
</div>

<script>
/* ==============================================
   CONFIG — EDIT EVERYTHING HERE
   ==============================================
   Each entry has:
     symbol    — the element symbol
     name      — the element name
     subtitle  — a short tagline (e.g. "where we met")
     text      — your journal entry / glossary text
*/
const GLOSSARY = [
  {
    symbol: "W",
    name: "Walmart",
    subtitle: "Where we met",
    text: "I will never forget the day I first saw you. I knew you were going to be my love, forever. I had no idea how much my life was going to change, but I am so glad it did. It\u2019s where we started though, at a Walmart, just working together, and we never needed some meet-cute story because who cares? We found each other, and that\u2019s all we needed to know. Taking breaks together, eating lunch together, refilling your water bottle 6 times in a shift since we both kept drinking from it at once. The literal rage that would fill me when we couldn\u2019t get scheduled days off, or more time together. Either way, it\u2019s just where we started and where we first said \u201CI love you\u2026\u201D You held my hands in yours, promised me I wouldn\u2019t say anything back to you, and just said it \u201CI love you so fucking much, Djay.\u201D I couldn\u2019t believe the girl of my dreams just said that to me and I couldn\u2019t say anything back, I pinky promised. Until we got to our cars after you got off, and I was about to let you drive home without saying anything, but I had to. I jumped out of my car, ran over, and told you how much I love you, we kissed, and I just need that. I really need that Marti."
  },
  {
    symbol: "H",
    name: "Home",
    subtitle: "Frozen, three times",
    text: "Write your glossary entry here. She fell asleep watching Frozen three times. Replace this with your own words."
  },
  {
    symbol: "En",
    name: "Evenings",
    subtitle: "Bedtime stories on FaceTime",
    text: "Write your glossary entry here. Bedtime stories on FaceTime every night. Replace this with your own words."
  },
  {
    symbol: "Y",
    name: "Yellow",
    subtitle: "The sunflower field",
    text: "Write your glossary entry here. The sunflower field, where you asked her to be yours. Replace this with your own words."
  },
  {
    symbol: "O",
    name: "Our Escape (That Wasn't)",
    subtitle: "Locked in together",
    text: "Write your glossary entry here. The escape room — you didn't escape, and that was the funniest part. Replace this with your own words."
  },
  {
    symbol: "U",
    name: "Under the Sun",
    subtitle: "Keystone State Park",
    text: "Write your glossary entry here. Keystone State Park, swimming, first picnic, the bracelet. Replace this with your own words."
  },
  {
    symbol: "Kn",
    name: "Keener",
    subtitle: "June 3rd — she said \"duh\"",
    text: "Write your glossary entry here. June 3rd, Legion Keener Park, your first kiss, she said \"duh\". Replace this with your own words."
  },
  {
    symbol: "Ow",
    name: "Our World",
    subtitle: "The Meadows",
    text: "Write your glossary entry here. The Meadows, first hangout, the slurp, the ice cream. Replace this with your own words."
  },
  {
    symbol: "Yo",
    name: "Tokyo",
    subtitle: "Her favorite restaurant",
    text: "Write your glossary entry here. Mr Tokyo, her favorite restaurant, the soy sauce. Replace this with your own words."
  },
  {
    symbol: "U",
    name: "Us",
    subtitle: "Twin Lakes",
    text: "Write your glossary entry here. Twin Lakes, the photos, her lockscreen photo. Replace this with your own words."
  },
  {
    symbol: "K",
    name: "Spark",
    subtitle: "Pittsburgh lantern festival",
    text: "Write your glossary entry here. Pittsburgh lantern festival, releasing lanterns on the water. Replace this with your own words."
  },
  {
    symbol: "No",
    name: "No Matter What",
    subtitle: "It was never about the movie",
    text: "Write your glossary entry here. The movie theater — it was never about the movie. Replace this with your own words."
  },
  {
    symbol: "W",
    name: "Walmart",
    subtitle: "Where it ends, where it begins again",
    text: "Write your glossary entry here. Where it started, where it ends, praying there's room for more. Replace this with your own words."
  }
];

/* ==============================================
   RENDER ENTRIES
   ============================================== */
var container = document.getElementById('entries');

GLOSSARY.forEach(function(entry) {
  var div = document.createElement('div');
  div.className = 'entry';
  div.innerHTML =
    '<div class="entry-card">' +
      '<div class="entry-header">' +
        '<div class="entry-symbol"><span>' + entry.symbol + '</span></div>' +
        '<div class="entry-meta">' +
          '<div class="entry-name">' + entry.name + '</div>' +
          '<div class="entry-subtitle">' + entry.subtitle + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="entry-divider"></div>' +
      '<div class="entry-text">' + entry.text + '</div>' +
    '</div>';
  container.appendChild(div);
});
</script>
</body>
</html>
